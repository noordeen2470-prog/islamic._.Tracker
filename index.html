<!DOCTYPE html>
<html>
<head>
  <title>Islamic Routine Tracker</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #ffffff;
    }

    body {
      font-family: Arial;
      padding: 20px;
      background: #ffffff;
      color: #111;
    }

    /* ✅ FIX HEADER */
    h1 {
      text-align: center;
      color: #15803d;
      position: sticky;
      top: 0;
      background: #ffffff;
      z-index: 100;
      margin: 0;
      padding: 10px;
    }

    /* ✅ SCROLL AREA */
    .table-container {
      overflow: auto;
      max-height: 80vh;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      background: #ffffff;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 6px;
      font-size: 11px;
      text-align: center;
      white-space: nowrap;
    }

    /* ✅ FIX TOP ROW */
    th {
      background: #dcfce7;
      color: #065f46;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    td {
      background: #ffffff;
    }

    /* ✅ FIX FIRST COLUMN */
    td:first-child, th:first-child {
      position: sticky;
      left: 0;
      background: #f9fafb;
      z-index: 60;
      text-align: left;
      font-weight: bold;
    }

    input {
      transform: scale(1.2);
      cursor: pointer;
      accent-color: #16a34a;
    }

    /* ✅ FOOTER */
    .footer {
      margin-top: 20px;
      text-align: center;
      font-size: 14px;
      color: #065f46;
      font-style: italic;
      padding: 15px;
      border-top: 1px solid #ccc;
    }
  </style>
</head>
